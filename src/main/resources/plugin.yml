name: SimpleQuest
version: 1.0.0-SNAPSHOT
main: net.azisaba.simplequest.SimpleQuest
loader: net.azisaba.simplequest.SimpleQuestBootstrap
api-version: 1.21
depend: []
softdepend:
  - kunectron

permissions:
  simplequest.reload:
    description: Reload quest definitions and config
    default: op
  simplequest.grant:
    description: Grant a quest type to a player
    default: op
  simplequest.revoke:
    description: Revoke a quest type from a player
    default: op
  simplequest.progress:
    description: Update quest progress for a player
    default: op
  simplequest.stage:
    description: Manage quest stages
    default: op
  simplequest.debug:
    description: Debug GUI access
    default: op

commands:
  simplequest:
    description: SimpleQuest management command
    usage: /simplequest <reload|grant|revoke|progress|quest|party>
  party:
    description: Party management command
    usage: /party <invite|accept|kick>
