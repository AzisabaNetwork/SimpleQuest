name: Integration Test

on:
  pull_request:
    branches: [release]

permissions: {}

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: test
          MARIADB_DATABASE: simplequest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Setup Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Build plugin
        run: ./gradlew shadowJar

      - name: Setup Paper servers
        run: |
          mkdir -p artifacts

          # Download Paper 1.21.11 (latest stable)
          API="https://fill.papermc.io/v3/projects/paper"
          UA="SimpleQuest-CI/1.0"
          URL=$(curl -fsSL -H "User-Agent: $UA" \
            "$API/versions/1.21.11/builds" | \
            jq -r '[.[] | select(.channel == "STABLE")] | last
              | .downloads["server:default"].url')
          curl -fsSL -H "User-Agent: $UA" -o paper.jar "$URL"

          for i in master slave readonly; do
            dir="servers/$i"
            mkdir -p "$dir/plugins/SimpleQuest"

            echo "eula=true" > "$dir/eula.txt"

            cat > "$dir/server.properties" << 'PROPS'
          online-mode=false
          enable-rcon=true
          rcon.password=test
          PROPS

            case $i in
              master)
                echo "server-port=25565" >> "$dir/server.properties"
                echo "rcon.port=25575" >> "$dir/server.properties"
                ;;
              slave)
                echo "server-port=25566" >> "$dir/server.properties"
                echo "rcon.port=25576" >> "$dir/server.properties"
                ;;
              readonly)
                echo "server-port=25567" >> "$dir/server.properties"
                echo "rcon.port=25577" >> "$dir/server.properties"
                ;;
            esac

            # Copy plugin jar
            cp build/libs/*.jar "$dir/plugins/"

            # Copy server config fixture
            SRC="src/integrationTest/resources/${i}-config.yml"
            DST="$dir/plugins/SimpleQuest/config.yml"
            cp "$SRC" "$DST"

            # Copy Paper jar
            cp paper.jar "$dir/"
          done

          # Copy test quests
          for i in master slave readonly; do
            QDIR="servers/$i/plugins/SimpleQuest/@test/types"
            mkdir -p "$QDIR"
            cp src/integrationTest/resources/quests/test_quest.yml "$QDIR/"
          done

      - name: Start servers
        run: |
          start_server() {
            local name=$1
            local dir="servers/$name"
            local log="$dir/server.log"
            mkfifo "$dir/stdin"
            tail -f "$dir/stdin" | \
              java -Xmx512M -jar "$dir/paper.jar" --nogui > "$log" 2>&1 &
            echo $! > "$dir/pid"

            # Wait for "Done" (max 180s)
            timeout 180 bash -c "
              until grep -q 'Done' \"$log\" 2>/dev/null; do sleep 2; done
            " || {
              echo "[$name] Server failed to start! Last 50 lines:"
              tail -50 "$log"
              exit 1
            }

            local port
            port=$(grep 'server-port' "$dir/server.properties" | cut -d= -f2)
            echo "[$name] Server started on port $port"
          }

          start_server master
          start_server slave
          start_server readonly

      - name: Install bot dependencies
        working-directory: bots
        run: |
          corepack enable pnpm
          pnpm install --frozen-lockfile

      - name: Run bot scenarios
        working-directory: bots
        run: |
          pnpm exec tsx src/main.ts 2>&1 | tee ../artifacts/bot-output.log

      - name: Run kotest integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Stop servers
        if: always()
        run: |
          stop_server() {
            local name=$1
            local dir="servers/$name"
            if [ ! -d "$dir" ]; then
              echo "[$name] Server directory not found, skipping"
              return 0
            fi
            echo "stop" > "$dir/stdin"

            # Wait for graceful shutdown (max 30s)
            timeout 30 bash -c "
              while kill -0 \$(cat $dir/pid) 2>/dev/null; do
                sleep 1
              done
            " || true

            echo "[$name] Server stopped"

            # Copy logs to artifacts
            cp "$dir/server.log" "artifacts/${name}-server.log" || true
            cp "$dir/logs/latest.log" \
              "artifacts/${name}-latest.log" || true
          }

          stop_server master
          stop_server slave
          stop_server readonly

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-results
          path: |
            artifacts/*.log
            artifacts/*.png
            build/reports/tests/integrationTest/**
          retention-days: 7
